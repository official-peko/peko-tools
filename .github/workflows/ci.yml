# Lint and test on pull requests and pushes to main. Runs on Linux only to
# keep PR turnaround fast; the full multi-target build runs on nightly and on
# release tags through build.yml.
name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_REPO: official-peko/peko-llvm-dist
  LLVM_TAG: llvm-18.1.8

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libzstd-dev libncurses-dev
          zstd_a="$(dpkg -L libzstd-dev | grep -m1 '/libzstd\.a$')"
          echo "ZSTD_LIB_PREFIX=$(dirname "$zstd_a")" >> "$GITHUB_ENV"
          t6="$(ldconfig -p | awk '/libtinfo\.so\.6/{print $NF; exit}')"
          if [ -n "$t6" ]; then sudo ln -sf "$t6" "$(dirname "$t6")/libtinfo.so.5"; fi

      - name: Fetch LLVM dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$HOME/llvm"
          gh release download "$LLVM_TAG" -R "$LLVM_REPO" -p llvm-18-x86_64-linux.tar.xz -O /tmp/llvm.tar.xz
          tar -xf /tmp/llvm.tar.xz -C "$HOME/llvm"
          cfg="$(find "$HOME/llvm" -type f -name llvm-config | head -n1)"
          if [ -z "$cfg" ]; then
            echo "llvm-config not found in the LLVM dist. Extracted layout:"
            find "$HOME/llvm" -maxdepth 3 | head -50
            exit 1
          fi
          chmod +x "$cfg" || true
          prefix="$(cd "$(dirname "$cfg")/.." && pwd)"
          echo "LLVM_SYS_180_PREFIX=$prefix" >> "$GITHUB_ENV"
          "$cfg" --version

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --all --locked

      - name: Third-party notices are current
        # Adding or bumping a dependency changes what must be attributed in the
        # shipped archives. Regenerating here and diffing catches a stale
        # THIRD-PARTY-NOTICES.txt at review time rather than after release.
        run: |
          # Pinned: a newer generator can reformat the output, which would fail
          # this check as a "stale file" when nothing about the dependencies
          # changed. Bump deliberately, regenerating the committed file with it.
          cargo install cargo-about --version 0.9.1 --features cli --locked
          ./scripts/gen-notices.sh
          if ! git diff --quiet -- THIRD-PARTY-NOTICES.txt; then
            echo "::error::THIRD-PARTY-NOTICES.txt is out of date. Run ./scripts/gen-notices.sh and commit the result."
            # The full diff, not just a stat: a mismatch here is usually one
            # added crate, and seeing which one is the whole diagnosis.
            git --no-pager diff -- THIRD-PARTY-NOTICES.txt
            exit 1
          fi
