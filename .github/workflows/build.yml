# Reusable matrix build for all Peko targets. Callers pass a version string
# used in archive names. Each target runs on its native runner, fetches the
# matching prebuilt LLVM 18 dist, builds the workspace, and uploads one
# archive artifact per target.
name: build

on:
  workflow_call:
    inputs:
      version:
        description: "Version string used in archive names"
        required: true
        type: string

env:
  LLVM_REPO: official-peko/peko-llvm-dist
  LLVM_TAG: llvm-18.1.8

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            llvm_asset: llvm-18-x86_64-linux.tar.xz
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            llvm_asset: llvm-18-aarch64-linux.tar.xz
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            llvm_asset: llvm-18-aarch64-macos.tar.xz
          - name: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            llvm_asset: llvm-18-x86_64-macos.tar.xz
          - name: windows-x86_64
            runner: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            llvm_asset: llvm-18-x86_64-windows.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libzstd-dev libncurses-dev
          zstd_a="$(dpkg -L libzstd-dev | grep -m1 '/libzstd\.a$')"
          echo "ZSTD_LIB_PREFIX=$(dirname "$zstd_a")" >> "$GITHUB_ENV"
          # The prebuilt llvm-config is linked against libtinfo.so.5, which is
          # not shipped on ubuntu 24.04. Point a .so.5 name at the installed
          # .so.6; llvm-config only needs the loader to resolve the name.
          t6="$(ldconfig -p | awk '/libtinfo\.so\.6/{print $NF; exit}')"
          if [ -n "$t6" ]; then sudo ln -sf "$t6" "$(dirname "$t6")/libtinfo.so.5"; fi

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: |
          brew install zstd
          echo "ZSTD_LIB_PREFIX=$(brew --prefix zstd)/lib" >> "$GITHUB_ENV"

      - name: Install Windows system deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install zstd:x64-windows-static-md
          $lib = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md\lib"
          if (-not (Test-Path "$lib\libzstd.lib")) {
            $src = Get-ChildItem $lib -Filter 'zstd*.lib' | Select-Object -First 1
            if ($src) { Copy-Item $src.FullName "$lib\libzstd.lib" }
          }
          "ZSTD_LIB_PREFIX=$lib" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Fetch LLVM dist (unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$HOME/llvm"
          gh release download "$LLVM_TAG" -R "$LLVM_REPO" -p "${{ matrix.llvm_asset }}" -O /tmp/llvm.tar.xz
          tar -xf /tmp/llvm.tar.xz -C "$HOME/llvm"
          cfg="$(find "$HOME/llvm" -type f -name llvm-config | head -n1)"
          if [ -z "$cfg" ]; then
            echo "llvm-config not found in the LLVM dist. Extracted layout:"
            find "$HOME/llvm" -maxdepth 3 | head -50
            exit 1
          fi
          chmod +x "$cfg" || true
          prefix="$(cd "$(dirname "$cfg")/.." && pwd)"
          echo "LLVM_SYS_180_PREFIX=$prefix" >> "$GITHUB_ENV"
          "$cfg" --version

      - name: Fetch LLVM dist (windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release download $env:LLVM_TAG -R $env:LLVM_REPO -p "${{ matrix.llvm_asset }}" -O llvm.zip
          Expand-Archive llvm.zip -DestinationPath "$env:USERPROFILE\llvm-extract"
          $cfg = Get-ChildItem "$env:USERPROFILE\llvm-extract" -Recurse -Filter llvm-config.exe | Select-Object -First 1
          if (-not $cfg) {
            Write-Host "llvm-config.exe not found in the LLVM dist. Extracted layout:"
            Get-ChildItem "$env:USERPROFILE\llvm-extract" -Recurse -Depth 3 | Select-Object FullName | Format-Table -AutoSize
            exit 1
          }
          $prefix = Split-Path (Split-Path $cfg.FullName -Parent) -Parent
          "LLVM_SYS_180_PREFIX=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Append
          & $cfg.FullName --version

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          ver="${{ inputs.version }}"
          ver="${ver#v}"
          out="peko-${ver}-${{ matrix.target }}"
          mkdir "$out"
          cp target/release/peko "$out"/
          tar -C "$out" -cJf "${out}.tar.xz" .
          echo "ASSET=${out}.tar.xz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ inputs.version }}".TrimStart("v")
          $out = "peko-$ver-${{ matrix.target }}"
          New-Item -ItemType Directory $out | Out-Null
          Copy-Item target/release/peko.exe $out
          Compress-Archive -Path "$out\*" -DestinationPath "$out.zip"
          "ASSET=$out.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}
          retention-days: 7
