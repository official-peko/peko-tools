# Release build. Triggered by pushing a version tag. Builds all targets and
# publishes a GitHub release with the tagged archives. Tags in the 0.x series
# or carrying a SemVer prerelease suffix are marked as prereleases; a 1.0.0 or
# later tag without a suffix publishes as a normal release.
name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      version: ${{ github.ref_name }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Bundle toolchain descriptors
        # The toolchain.toml files are the source of truth for how each target's
        # SDK is used. `peko setup` downloads this bundle and lays the descriptors
        # into the installed toolchains. The SDK and the linux/android toolchain
        # payloads themselves are published separately on peko-sdk-dist.
        run: |
          ver="${{ github.ref_name }}"; ver="${ver#v}"
          tar -C toolkit -cJf "dist/peko-toolchain-descriptors-${ver}.tar.xz" toolchains
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" == *-* || "$TAG" == v0.* ]]; then
            PRE="--prerelease"
          else
            PRE=""
          fi
          # Replace any existing release for this tag so a re-published tag
          # overrides it. The git tag itself is left in place.
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes || true
          gh release create "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            $PRE
