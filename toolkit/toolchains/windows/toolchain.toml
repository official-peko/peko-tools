# Toolchain description for Windows on x86_64.
#
# Paths are relative to this file's directory and follow the xwin splat layout:
# the MSVC CRT under crt/ and the Windows SDK under sdk/, with the canonical
# x86_64 arch folder name (xwin's default, not the MS "x64" notation). The
# WebView2 SDK is placed alongside under webview2/; it is a separate NuGet
# package, not part of the MSVC/SDK surface xwin provides. The flags build a
# console program.

[toolchain]
id = "windows-x86_64"
target = "windows"
arch = "x86_64"
triple = "x86_64-pc-win32"

[build]
cxx_std = "c++20"
c_flags = [
  "-Wno-microsoft-anon-tag",
  "-Wno-ignored-pragma-intrinsic",
  "-Wno-ignored-attributes",
  "-Wno-pragma-pack",
  "-Wno-nonportable-include-path",
  "-D_DLL",
  "-D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH",
]
objc_flags = []
include = [
  "crt/include",
  "sdk/include/ucrt",
  "sdk/include/um",
  "sdk/include/shared",
  "sdk/include/winrt",
  "sdk/include/cppwinrt",
  "webview2/build/native/include",
]

[link]
driver = "lld-link"
lib_paths = [
  "crt/lib/x86_64",
  "sdk/lib/ucrt/x86_64",
  "sdk/lib/um/x86_64",
]
libs = ["ucrt", "msvcrt", "shell32", "shlwapi", "user32", "ws2_32", "dcomp", "d3d11", "dxgi"]
frameworks = []
objects = []
flags = ["-machine:x64", "-subsystem:console", "-nologo"]
