# Toolchain description for iOS on arm64 (device). Used for release builds,
# which sign and submit to the App Store.
#
# Paths are relative to this file's directory. OpenSSL is shared two levels up
# at ../../openssl_libs (this toolchain now nests under ios/arm/).

[toolchain]
id = "ios-arm-device"
target = "ios"
arch = "arm"
triple = "arm64-apple-ios"

[build]
cxx_std = "c++17"
c_flags = ["-fobjc-arc", "-isysroot", "iPhoneOS.sdk"]
objc_flags = ["-fmodules"]
include = ["include/c++"]

[link]
driver = "ld64.lld"
lib_paths = []
libs = ["objc", "c++", "c"]
frameworks = ["Security", "Foundation", "UIKit", "CoreGraphics"]
objects = ["../../openssl_libs/libssl.a", "../../openssl_libs/libcrypto.a"]
# The two -platform_version values are the minimum and SDK versions.
flags = [
  "-w",
  "-dynamic",
  "-arch", "arm64",
  "-platform_version", "ios", "15.0", "26.2",
  "-syslibroot", "iPhoneOS.sdk",
]
