# Toolchain description for iOS on arm64 (device).
#
# Paths are relative to this file's directory. OpenSSL is shared one level up
# at ../openssl_libs.

[toolchain]
id = "ios-arm64"
target = "ios"
arch = "arm"
triple = "arm64-apple-ios"

[build]
cxx_std = "c++17"
c_flags = ["-fobjc-arc", "-isysroot", "iPhoneOS.sdk"]
objc_flags = ["-fmodules"]
include = ["include/c++"]

[link]
driver = "ld64.lld"
lib_paths = []
libs = ["objc", "c++", "c"]
frameworks = ["Security", "Foundation", "UIKit", "CoreGraphics"]
objects = ["../openssl_libs/libssl.a", "../openssl_libs/libcrypto.a"]
# The two -platform_version values are the minimum and SDK versions.
flags = [
  "-w",
  "-dynamic",
  "-arch", "arm64",
  "-platform_version", "ios", "15.0", "26.2",
  "-syslibroot", "iPhoneOS.sdk",
]
